# Publishes the documentation to the repository's GitHub Wiki.
#
# Single source of truth: docs/*.dokuwiki. English pages are the default;
# each has a Russian sibling (*.ru.dokuwiki). The workflow regenerates the
# Markdown pages with docs/dokuwiki2markdown.py and mirrors them into the wiki
# repo. Generated _wiki/*.md files are build artifacts (git-ignored).
#
# Page mapping:
#   pfs-utils.dokuwiki            -> Home
#   pfs-utils.ru.dokuwiki         -> Home-ru
#   aufs-alternatives.dokuwiki    -> aufs-alternatives
#   aufs-alternatives.ru.dokuwiki -> aufs-alternatives-ru
#
# Prerequisites (one-time, manual):
#   1. Settings -> Features -> enable "Wikis".
#   2. Create the first wiki page in the web UI (any content). The wiki git
#      repo (<repo>.wiki.git) does NOT exist until the first page is saved.
name: Publish docs to Wiki

on:
  push:
    branches: [master, main]
    paths:
      - "docs/*.dokuwiki"
      - "docs/dokuwiki2markdown.py"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-wiki
  cancel-in-progress: false

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Markdown pages from DokuWiki sources
        run: |
          python3 docs/dokuwiki2markdown.py --out-dir _wiki docs/*.dokuwiki

      - name: Clone wiki repository
        run: |
          if ! git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki; then
            echo "::error::Could not clone the wiki repo. Enable Wikis and create the first page in the web UI once."
            exit 1
          fi

      - name: Sync generated pages into the wiki
        run: |
          shopt -s nullglob
          for f in _wiki/*.md; do
            base="$(basename "$f" .md)"
            case "$base" in
              pfs-utils)    page="Home" ;;
              pfs-utils.ru) page="Home-ru" ;;
              *.ru)         page="${base%.ru}-ru" ;;
              *)            page="$base" ;;
            esac
            find wiki -maxdepth 1 -type f -name "${page}.*" ! -name "${page}.md" -delete
            cp "$f" "wiki/${page}.md"
            echo "synced $f -> ${page}.md"
          done

      - name: Commit and push wiki changes
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
          else
            git commit -m "docs: sync wiki from ${{ github.repository }}@${{ github.sha }}"
            git push
          fi
