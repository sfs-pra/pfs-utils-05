# pfs-utils runtime configuration
#
# Read by the pfs library at startup. Env vars set by the caller win over
# values in this file (so `EXT=sfs pfsload foo.sfs` overrides the config).
#
# pfs-utils and modman ship separate config files because they can be
# installed/used independently. EXT here mirrors EXT in /etc/modman.conf
# so both layers see the same module extension when used together.

# Расширение файлов модулей (без ведущей точки).
# По умолчанию — pfs (PuppyRus filesystem).
# Меняется только при использовании альтернативного формата контейнера.
EXT="pfs"
